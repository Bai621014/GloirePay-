<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }} — GloireDevIA</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <main class="container">
    <header>
      <h1>{{ title }} — Résultat</h1>
    </header>

    <section class="card">
      <p style="color: var(--muted);">Détails de l'analyse système :</p>
      <pre class="output">{{ result | tojson(indent=2) }}</pre>
    </section>

    <div class="actions">
      <a href="{{ url_for('index') }}">
        <button class="secondary">Retour à l'interface</button>
      </a>
    </div>
  </main>
</body>
</html>
