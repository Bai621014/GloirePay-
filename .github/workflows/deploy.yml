name: GloirePay Automated Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
        
      - name: Install System Dependencies
        run: pip install -r requirements.txt
        
      - name: Execute Security Audit (Pytest)
        run: pytest tests/test_gloire_vip.py
        
      - name: Deploy Sovereign Treasury Engine
        env:
          POLYGON_RPC_URL: ${{ secrets.POLYGON_RPC_URL }}
        run: python deploy_treasury.py
