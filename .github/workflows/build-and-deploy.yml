  deploy:
    needs: audit-et-simulation
    runs-on: ubuntu-latest
    # --- AJOUTEZ CE BLOC ICI ---
    env:
      POLYGON_PRIVATE_KEY: ${{ secrets.POLYGON_PRIVATE_KEY }}
      POLYGON_RPC_URL: ${{ secrets.POLYGON_RPC_URL }}
    # ---------------------------
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
          
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installation des dépendances
        run: pip install web3

      - name: Exécution du transfert souverain
        # Plus besoin de redéfinir env ici, il est hérité du job
        run: python execute_transfer.py
