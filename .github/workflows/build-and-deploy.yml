      - name: Simulation de Sécurité (Alchemy)
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          POLYGON_RPC_URL: ${{ secrets.POLYGON_RPC_URL }}
        run: |
          echo ">>> [AUDIT] Lancement de la simulation via API directe..."
          
          # On interroge l'API Alchemy pour vérifier la connectivité du nœud
          RESPONSE=$(curl -s -X POST "$POLYGON_RPC_URL/$ALCHEMY_API_KEY" \
            -H "Content-Type: application/json" \
            --data '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}')
          
          echo "Réponse du nœud : $RESPONSE"
          
          if [[ $RESPONSE == *"result"* ]]; then
            echo ">>> [SUCCESS] Audit validé : Nœud opérationnel."
          else
            echo ">>> [CRITIQUE] Échec de la communication avec le nœud."
            exit 1
          fi
