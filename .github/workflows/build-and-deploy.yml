name: GloirePay — Pipeline Souverain

on:
  push:
    branches: [ main ]

jobs:
  audit-et-simulation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Audit Nœud & Structure
        env:
          POLYGON_RPC_URL: ${{ secrets.POLYGON_RPC_URL }}
        run: |
          echo ">>> [AUDIT] Vérification de la souveraineté..."
          curl -s -X POST "$POLYGON_RPC_URL" \
            -H "Content-Type: application/json" \
            --data '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}'
          ls -R

  deploy:
    needs: audit-et-simulation
    runs-on: ubuntu-latest
    env:
      POLYGON_RPC_URL: ${{ secrets.POLYGON_RPC_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
          
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installation dépendances
        run: pip install web3 requests

      - name: Exécution du moteur GloireTech
        # Correction : ajout de PYTHONPATH pour forcer Python à voir les fichiers à la racine
        run: PYTHONPATH=$PYTHONPATH:. python deploy_engine.py
